services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls149
    container_name: mpilot-prowlarr
    restart: unless-stopped
    depends_on:
      - flaresolverr
    environment:
      PUID: ${PUID:-501}
      PGID: ${PGID:-20}
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - ./data/prowlarr:/config
    ports:
      - "127.0.0.1:9696:9696"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    container_name: mpilot-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
      TZ: ${TZ:-Europe/Paris}
  mpilot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mpilot-api
    restart: unless-stopped
    depends_on:
      - prowlarr
    environment:
      MPILOT_PROWLARR_URL: ${MPILOT_PROWLARR_URL:-http://prowlarr:9696}
      MPILOT_PROWLARR_DOWNLOAD_URL: ${MPILOT_PROWLARR_DOWNLOAD_URL:-}
      MPILOT_PROWLARR_API_KEY: ${MPILOT_PROWLARR_API_KEY:-}
      MPILOT_QBIT_URL: ${MPILOT_QBIT_URL:-}
      MPILOT_QBIT_USERNAME: ${MPILOT_QBIT_USERNAME:-}
      MPILOT_QBIT_PASSWORD: ${MPILOT_QBIT_PASSWORD:-}
      MPILOT_ACQUISITION_API_KEY: ${MPILOT_ACQUISITION_API_KEY:?MPILOT_ACQUISITION_API_KEY is required}
      MPILOT_ACQUISITION_SAVE_PATH_MOVIE: ${MPILOT_ACQUISITION_SAVE_PATH_MOVIE:-/downloads/movies}
      MPILOT_ACQUISITION_SAVE_PATH_MOVIE_4K: ${MPILOT_ACQUISITION_SAVE_PATH_MOVIE_4K:-/downloads/movies-4k}
      MPILOT_ACQUISITION_SAVE_PATH_TV: ${MPILOT_ACQUISITION_SAVE_PATH_TV:-/downloads/tv}
      MPILOT_ACQUISITION_EXTRA_SAVE_PATHS: ${MPILOT_ACQUISITION_EXTRA_SAVE_PATHS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MPILOT_ACQUISITION_REQUEST_TIMEOUT_SECONDS: ${MPILOT_ACQUISITION_REQUEST_TIMEOUT_SECONDS:-30}
      MPILOT_ACQUISITION_QUERY_SNAPSHOT_DIR: /app/data/query-snapshots
      MPILOT_ACQUISITION_QUERY_SNAPSHOT_RETENTION_SECONDS: ${MPILOT_ACQUISITION_QUERY_SNAPSHOT_RETENTION_SECONDS:-604800}
      MPILOT_PROWLARR_PRIMARY_INDEXER_IDS: ${MPILOT_PROWLARR_PRIMARY_INDEXER_IDS:-}
      MPILOT_PROWLARR_FALLBACK_INDEXER_IDS: ${MPILOT_PROWLARR_FALLBACK_INDEXER_IDS:-}
      MPILOT_ACQUISITION_PREFER_RESOLUTION: ${MPILOT_ACQUISITION_PREFER_RESOLUTION:-1080p}
      MPILOT_ACQUISITION_PREFER_SOURCE: ${MPILOT_ACQUISITION_PREFER_SOURCE:-WEB-DL}
      MPILOT_ACQUISITION_PREFER_CODEC: ${MPILOT_ACQUISITION_PREFER_CODEC:-H.264}
      MPILOT_ACQUISITION_MIN_SEEDERS: ${MPILOT_ACQUISITION_MIN_SEEDERS:-5}
      MPILOT_ACQUISITION_DEFAULT_MODE: ${MPILOT_ACQUISITION_DEFAULT_MODE:-manual}
      MPILOT_ACQUISITION_MANUAL_RESULT_LIMIT: ${MPILOT_ACQUISITION_MANUAL_RESULT_LIMIT:-4}
      MPILOT_ACQUISITION_CHOICE_STYLE: ${MPILOT_ACQUISITION_CHOICE_STYLE:-hermes-default}
      MPILOT_ACQUISITION_CLEANUP_ENABLED: ${MPILOT_ACQUISITION_CLEANUP_ENABLED:-false}
      MPILOT_ACQUISITION_CLEANUP_COMPLETED_AFTER_SECONDS: ${MPILOT_ACQUISITION_CLEANUP_COMPLETED_AFTER_SECONDS:-259200}
      MPILOT_ACQUISITION_CLEANUP_INTERVAL_SECONDS: ${MPILOT_ACQUISITION_CLEANUP_INTERVAL_SECONDS:-21600}
      MPILOT_ACQUISITION_CLEANUP_INCLUDE_LEGACY_REQUESTER_TAGS: ${MPILOT_ACQUISITION_CLEANUP_INCLUDE_LEGACY_REQUESTER_TAGS:-true}
    volumes:
      - ./data/mpilot:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8000/health'); key=os.getenv('MPILOT_ACQUISITION_API_KEY'); req.add_header('X-API-Key', key) if key else None; urllib.request.urlopen(req, timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
