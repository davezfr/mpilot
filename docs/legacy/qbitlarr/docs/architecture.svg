<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1086" viewBox="0 0 1448 1086" role="img" aria-labelledby="title desc">
  <title id="title">qBitlarr architecture</title>
  <desc id="desc">People, shell scripts, and LLM agents call qBitlarr through REST, MCP, or CLI. qBitlarr runs in Docker Compose with bundled Prowlarr and FlareSolverr, searches external torrent indexers, queues downloads in user-provided qBittorrent, and qBittorrent saves files into a Plex, Jellyfin, or Emby media library.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.28"/>
    </pattern>
    <linearGradient id="pageGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="48%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#a78bfa"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .panel-title { font: 700 23px Arial, Helvetica, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .box-title { font: 700 21px Arial, Helvetica, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .box-subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #cbd5e1; letter-spacing: 0; }
      .edge-label { font: 700 14px Arial, Helvetica, sans-serif; fill: #e2e8f0; letter-spacing: 0; }
      .tiny { font: 400 13px Arial, Helvetica, sans-serif; fill: #94a3b8; letter-spacing: 0; }
      .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #e0f2fe; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1448" height="1086" fill="url(#pageGlow)"/>
  <rect width="1448" height="1086" fill="url(#grid)" opacity="0.7"/>
  <circle cx="162" cy="152" r="198" fill="#22d3ee" opacity="0.055"/>
  <circle cx="1220" cy="818" r="232" fill="#a78bfa" opacity="0.07"/>

  <text x="72" y="76" class="title">qBitlarr Architecture</text>
  <text x="72" y="109" class="subtitle">REST, MCP, and CLI clients share one FastAPI service that searches Prowlarr and queues downloads in your own qBittorrent.</text>

  <!-- Boundaries -->
  <g filter="url(#softShadow)">
    <rect x="384" y="320" width="552" height="598" rx="22" fill="#78350f" fill-opacity="0.12" stroke="#fbbf24" stroke-width="2"/>
  </g>
  <text x="424" y="363" class="panel-title">Docker Compose</text>
  <text x="424" y="390" class="box-subtitle">Bundled by qBitlarr: API, Prowlarr, and FlareSolverr</text>

  <g filter="url(#softShadow)">
    <rect x="1038" y="406" width="338" height="512" rx="22" fill="#78350f" fill-opacity="0.12" stroke="#fbbf24" stroke-width="2"/>
  </g>
  <text x="1080" y="454" class="panel-title">You provide</text>
  <text x="1080" y="481" class="box-subtitle">qBittorrent and the final media library</text>

  <!-- Workflow paths -->
  <path d="M724 218V408" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M724 528V600" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M532 660H342" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M916 468C990 468 1002 560 1076 560" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M724 720V780" fill="none" stroke="#a78bfa" stroke-width="3" stroke-dasharray="10 9" marker-end="url(#arrowViolet)"/>
  <path d="M592 720C558 744 528 762 512 780" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="8 8" marker-end="url(#arrowViolet)"/>
  <path d="M1210 642V780" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Entry point -->
  <g filter="url(#softShadow)">
    <rect x="384" y="144" width="680" height="74" rx="18" fill="#083344" fill-opacity="0.62" stroke="#22d3ee" stroke-width="2"/>
    <text x="724" y="188" text-anchor="middle" class="box-title">People, shell scripts, and LLM agents</text>
  </g>
  <g>
    <rect x="464" y="238" width="114" height="42" rx="21" fill="#083344" fill-opacity="0.86" stroke="#22d3ee"/>
    <text x="521" y="265" text-anchor="middle" class="chip">REST</text>
    <rect x="606" y="238" width="114" height="42" rx="21" fill="#4c1d95" fill-opacity="0.78" stroke="#a78bfa"/>
    <text x="663" y="265" text-anchor="middle" class="chip">MCP</text>
    <rect x="748" y="238" width="114" height="42" rx="21" fill="#064e3b" fill-opacity="0.78" stroke="#34d399"/>
    <text x="805" y="265" text-anchor="middle" class="chip">CLI</text>
  </g>

  <!-- Docker Compose services -->
  <g filter="url(#softShadow)">
    <rect x="532" y="408" width="384" height="120" rx="14" fill="#0f172a"/>
    <rect x="532" y="408" width="384" height="120" rx="14" fill="#064e3b" fill-opacity="0.45" stroke="#34d399" stroke-width="2"/>
    <text x="724" y="458" text-anchor="middle" class="box-title">qbitlarr</text>
    <text x="724" y="490" text-anchor="middle" class="box-subtitle">FastAPI :8000</text>
    <text x="724" y="516" text-anchor="middle" class="tiny">ranking, mode handling, auth, save paths</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="532" y="600" width="384" height="120" rx="14" fill="#0f172a"/>
    <rect x="532" y="600" width="384" height="120" rx="14" fill="#4c1d95" fill-opacity="0.44" stroke="#a78bfa" stroke-width="2"/>
    <text x="724" y="649" text-anchor="middle" class="box-title">Prowlarr</text>
    <text x="724" y="681" text-anchor="middle" class="box-subtitle">Indexer API :9696</text>
    <text x="724" y="707" text-anchor="middle" class="tiny">searches configured public/private indexers</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="406" y="780" width="270" height="110" rx="14" fill="#0f172a"/>
    <rect x="406" y="780" width="270" height="110" rx="14" fill="#881337" fill-opacity="0.4" stroke="#fb7185" stroke-width="2"/>
    <text x="541" y="826" text-anchor="middle" class="box-title">FlareSolverr</text>
    <text x="541" y="856" text-anchor="middle" class="box-subtitle">Challenge proxy :8191</text>
    <text x="541" y="881" text-anchor="middle" class="tiny">only for tagged Cloudflare indexers</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="704" y="780" width="206" height="110" rx="14" fill="#0f172a"/>
    <rect x="704" y="780" width="206" height="110" rx="14" fill="#1e293b" fill-opacity="0.76" stroke="#94a3b8" stroke-width="2"/>
    <text x="807" y="826" text-anchor="middle" class="box-title">Snapshots</text>
    <text x="807" y="856" text-anchor="middle" class="box-subtitle">query history</text>
    <text x="807" y="881" text-anchor="middle" class="tiny">/app/data/query-snapshots</text>
  </g>

  <!-- External search and download surfaces -->
  <g filter="url(#softShadow)">
    <rect x="72" y="584" width="270" height="154" rx="18" fill="#0f172a"/>
    <rect x="72" y="584" width="270" height="154" rx="18" fill="#1e293b" fill-opacity="0.72" stroke="#94a3b8" stroke-width="2"/>
    <text x="207" y="648" text-anchor="middle" class="box-title">Torrent indexers</text>
    <text x="207" y="681" text-anchor="middle" class="box-subtitle">public and private trackers</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1076" y="510" width="268" height="132" rx="14" fill="#0f172a"/>
    <rect x="1076" y="510" width="268" height="132" rx="14" fill="#083344" fill-opacity="0.5" stroke="#22d3ee" stroke-width="2"/>
    <text x="1210" y="565" text-anchor="middle" class="box-title">qBittorrent</text>
    <text x="1210" y="598" text-anchor="middle" class="box-subtitle">Web UI API</text>
    <text x="1210" y="625" text-anchor="middle" class="tiny">desktop, NAS, seedbox, or container</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="1062" y="780" width="296" height="126" rx="14" fill="#0f172a"/>
    <rect x="1062" y="780" width="296" height="126" rx="14" fill="#4c1d95" fill-opacity="0.44" stroke="#a78bfa" stroke-width="2"/>
    <text x="1210" y="833" text-anchor="middle" class="box-title">Plex / Jellyfin / Emby</text>
    <text x="1210" y="866" text-anchor="middle" class="box-subtitle">media library paths</text>
  </g>

  <!-- Edge labels, centered on their lines -->
  <rect x="625" y="284" width="198" height="34" rx="8" fill="#020617" opacity="0.92"/>
  <text x="724" y="306" text-anchor="middle" class="edge-label">shared REST contract</text>

  <rect x="668" y="546" width="112" height="34" rx="8" fill="#020617" opacity="0.92"/>
  <text x="724" y="568" text-anchor="middle" class="edge-label">search API</text>

  <rect x="386" y="643" width="102" height="34" rx="8" fill="#020617" opacity="0.92"/>
  <text x="437" y="665" text-anchor="middle" class="edge-label">search</text>

  <rect x="940" y="500" width="112" height="34" rx="8" fill="#020617" opacity="0.92"/>
  <text x="996" y="522" text-anchor="middle" class="edge-label">Web UI API</text>

  <rect x="734" y="738" width="146" height="34" rx="8" fill="#020617" opacity="0.92"/>
  <text x="807" y="760" text-anchor="middle" class="edge-label">save snapshot</text>

  <rect x="424" y="738" width="176" height="34" rx="8" fill="#020617" opacity="0.92"/>
  <text x="512" y="760" text-anchor="middle" class="edge-label">Cloudflare only</text>

  <rect x="1150" y="704" width="120" height="34" rx="8" fill="#020617" opacity="0.92"/>
  <text x="1210" y="726" text-anchor="middle" class="edge-label">saves files</text>

  <!-- Summary cards -->
  <g filter="url(#softShadow)">
    <rect x="72" y="966" width="390" height="78" rx="14" fill="#083344" fill-opacity="0.38" stroke="#22d3ee"/>
    <text x="96" y="1000" class="box-subtitle">Interfaces</text>
    <text x="96" y="1028" class="tiny">REST is canonical; MCP and CLI are thin clients.</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="530" y="966" width="390" height="78" rx="14" fill="#4c1d95" fill-opacity="0.38" stroke="#a78bfa"/>
    <text x="554" y="1000" class="box-subtitle">Search</text>
    <text x="554" y="1028" class="tiny">Prowlarr aggregates indexers; FlareSolverr is opt-in.</text>
  </g>
  <g filter="url(#softShadow)">
    <rect x="986" y="966" width="390" height="78" rx="14" fill="#064e3b" fill-opacity="0.38" stroke="#34d399"/>
    <text x="1010" y="1000" class="box-subtitle">Downloads</text>
    <text x="1010" y="1028" class="tiny">qBittorrent remains external and writes to your library paths.</text>
  </g>
</svg>
